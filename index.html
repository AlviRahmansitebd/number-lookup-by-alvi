<!DOCTYPE html>
<html>
<head>
  <title>Number Lookup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="box">
    <h2>Number Lookup</h2>
    <input id="number" placeholder="Enter number e.g. +8801XXXXXXXXX">
    <button onclick="lookupNumber()">Search</button>
    <pre id="result">Result will show here</pre>
  </div>

  <script src="/script.js"></script>
</body>
</html>
